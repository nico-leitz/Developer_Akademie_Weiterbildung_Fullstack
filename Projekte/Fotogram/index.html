<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <title>Fotogram</title>
  </head>
  <body onload="renderImages()">
    <div class="sideWrapper">
      <div class="headerContentWrapper">
        <header class="header">
          <img
            src="./assets/img/fotogram_logo_header.svg"
            alt="A picture of the logo of Fotogram"
          />
        </header>
      </div>
      <div class="mainContentWrapper">
        <main>
          <div class="mainContentNoModal">
            <h1 id="dialogTitle"></h1>
            <div class="imgContainer"></div>
          </div>

          <dialog id="dialog" aria-labelledby="dialogTitle" class="d_none">
            <div class="modalHeader">
              <h2 id="modalTitle"></h2>
              <button id="btnCloseModal">
                <img
                  id="iconCloseModal"
                  src="./assets/img/button_Modal_X.svg"
                  alt="x button to close the modal"
                />
              </button>
            </div>
            <div class="modalImageContainer">
              <img id="modalImage" src="" alt="" />
            </div>
            <div class="modalControl">
              <img
                id="imgArrowLeft"
                src="./assets/img/arrowBtnLeft.svg"
                alt=""
                tabindex="0"
              />
              <p id="imageNumber"></p>
              <img
                id="imgArrowRight"
                src="./assets/img/arrowBtnRight.svg"
                alt=""
                tabindex="0"
              />
            </div>
          </dialog>
        </main>
      </div>

      <div class="footerContentWrapper">
        <footer>
          <img
            src="./assets/img/developer_akademie_logo.svg"
            alt="A icon from the logo of the developer akademie"
          />
          <p>© 2025 Developer Akademie GmbH</p>
        </footer>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
