<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <title>Fotogram</title>
  </head>
  <body>
    <div class="sideWrapper">
      <div class="headerContentWrapper">
        <header class="header">
          <img
            src="./assets/img/fotogram_logo_header.svg"
            alt="A picture of the logo of Fotogram"
          />
        </header>
      </div>
      <div class="mainContentWrapper">
        <main>
          <h1 id="dialogTitle">Your Personal photo album</h1>
          <button id="btnOpenModal">Open Modal</button>
          <div class="imgContainer"></div>
          <dialog id="dialog" aria-labelledby="dialogTitle" class="d_none">
            <button id="btnCloseModal">Close</button>
          </dialog>
        </main>
      </div>

      <div class="footerContentWrapper">
        <footer>
          <img
            src="./assets/img/developer_akademie_logo.svg"
            alt="A icon from the logo of the developer akademie"
          />
          <p>© 2025 Developer Akademie GmbH</p>
        </footer>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
